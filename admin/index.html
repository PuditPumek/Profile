<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { margin-bottom: 32px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 32px; color: #a5b4fc; margin-bottom: 8px; }
  .subtitle { color: #94a3b8; }
  .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 600; transition: all .2s; white-space: nowrap; align-self: center; }
  .back-btn:hover { background: rgba(255,255,255,.08); color: #e2e8f0; border-color: rgba(255,255,255,.2); }

  .tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid rgba(255,255,255,.08); }
  .tab-btn { background: none; border: none; padding: 12px 16px; color: #94a3b8; cursor: pointer; font-size: 14px; font-weight: 600; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .tab-btn.active { color: #a5b4fc; border-bottom-color: #a5b4fc; }
  .tab-btn:hover { color: #cbd5e1; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 8px; font-weight: 600; }
  input, textarea, select { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(148,163,184,.18); border-radius: 8px; color: #e2e8f0; padding: 10px 12px; font-size: 14px; outline: none; font-family: inherit; }
  input:focus, textarea:focus, select:focus { border-color: rgba(165,180,252,.5); background: rgba(165,180,252,.05); }
  textarea { min-height: 100px; resize: vertical; }
  select option { background: #1e2433; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  /* AVATAR UPLOAD */
  .avatar-section { display: flex; align-items: center; gap: 24px; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
  .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background: #1e2433; border: 2px solid rgba(99,102,241,.4); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-info { flex: 1; }
  .avatar-info p { font-size: 13px; color: #64748b; margin-top: 6px; }
  .upload-btn-label { display: inline-flex; align-items: center; gap: 8px; background: #6366f1; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: background .2s; }
  .upload-btn-label:hover { background: #818cf8; }
  #avatarFileInput { display: none; }
  .upload-progress { display: none; margin-top: 8px; font-size: 12px; color: #10b981; }

  .add-btn { background: #10b981; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
  .add-btn:hover { background: #059669; }

  .btn-group { display: flex; gap: 12px; margin-top: 28px; }
  .save-btn { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; flex: 1; }
  .save-btn:hover { background: #818cf8; }

  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; display: none; z-index: 1000; font-weight: 600; font-size: 14px; }
  .toast.success { background: #10b981; color: white; }
  .toast.error { background: #ef4444; color: white; }

  .skill-item { display: grid; grid-template-columns: 52px 1fr 80px auto; gap: 10px; align-items: end; margin-bottom: 10px; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-radius: 8px; padding: 10px; }
  .skill-item input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.1); border-radius: 0; padding: 6px 4px; }
  .skill-item input:focus { border-bottom-color: rgba(165,180,252,.6); background: transparent; }
  .skill-item button { padding: 8px 10px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; }

  .project-item { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .project-item h4 { color: #a5b4fc; margin-bottom: 12px; font-size: 14px; }
  .project-item label { margin-top: 12px; }
  .del-project-btn { margin-top: 14px; padding: 8px 12px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

  .divider { border-top: 1px solid rgba(255,255,255,.06); margin: 28px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-row">
      <div>
        <h1>⚙️ Admin Dashboard</h1>
        <p class="subtitle">จัดการข้อมูลโปรไฟล์ของคุณ</p>
      </div>
      <a href="/" class="back-btn">← กลับหน้า Profile</a>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="basic">ข้อมูลทั่วไป</button>
    <button class="tab-btn" data-tab="skills">Skills</button>
    <button class="tab-btn" data-tab="projects">Projects</button>
    <button class="tab-btn" data-tab="contact">Contact</button>
  </div>

  <!-- TAB: Basic Info -->
  <div id="basic" class="tab-content active">
    <div class="avatar-section">
      <div class="avatar-preview" id="avatarPreview">👨‍💻</div>
      <div class="avatar-info">
        <label style="margin-bottom:10px;display:block">รูปโปรไฟล์</label>
        <label class="upload-btn-label" for="avatarFileInput">📷 เลือกรูปภาพ</label>
        <input type="file" id="avatarFileInput" accept="image/*">
        <p>รองรับ JPG, PNG, GIF, WebP — ขนาดไม่เกิน 5MB</p>
        <div class="upload-progress" id="uploadProgress">⏳ กำลังอัปโหลด...</div>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label for="name">ชื่อ</label>
        <input id="name" type="text" placeholder="ชื่อคุณ">
      </div>
      <div class="form-group">
        <label for="role">ตำแหน่ง / Role</label>
        <input id="role" type="text" placeholder="FULL STACK DEVELOPER">
      </div>
    </div>
    <div class="form-group">
      <label for="subtitle">หัวข้อรอง</label>
      <input id="subtitle" type="text" placeholder="Building things for the web">
    </div>
    <div class="form-group">
      <label for="bio">แนะนำตัวเอง</label>
      <textarea id="bio" placeholder="บอกเกี่ยวกับตัวคุณ..."></textarea>
    </div>
  </div>

  <!-- TAB: Skills -->
  <div id="skills" class="tab-content">
    <div id="skillsList"></div>
    <button class="add-btn" id="addSkillBtn">+ เพิ่ม Skill ใหม่</button>
  </div>

  <!-- TAB: Projects -->
  <div id="projects" class="tab-content">
    <div id="projectsList"></div>
    <button class="add-btn" id="addProjectBtn">+ เพิ่ม Project ใหม่</button>
  </div>

  <!-- TAB: Contact -->
  <div id="contact" class="tab-content">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="text" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label for="github">GitHub URL</label>
      <input id="github" type="text" placeholder="https://github.com/username">
    </div>
    <div class="form-group">
      <label for="linkedin">LinkedIn URL</label>
      <input id="linkedin" type="text" placeholder="https://linkedin.com/in/username">
    </div>
    <div class="form-group">
      <label for="instagram">Instagram URL</label>
      <input id="instagram" type="text" placeholder="https://instagram.com/username">
    </div>
  </div>

  <div class="divider"></div>
  <div class="btn-group">
    <button class="save-btn" id="saveBtn">💾 บันทึกและกลับหน้า Profile</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let profileData = {};
const AUTH = 'Basic ' + btoa('admin:admin123');

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2000);
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

// Load profile
async function loadProfile() {
  try {
    const res = await fetch('/api/profile');
    if (!res.ok) throw new Error('Failed to load profile');
    profileData = await res.json();
    document.getElementById('name').value = profileData.name || '';
    document.getElementById('role').value = profileData.role || '';
    document.getElementById('subtitle').value = profileData.subtitle || '';
    document.getElementById('bio').value = profileData.bio || '';
    document.getElementById('email').value = profileData.email || '';
    document.getElementById('github').value = profileData.github || '';
    document.getElementById('linkedin').value = profileData.linkedin || '';
    document.getElementById('instagram').value = profileData.instagram || '';

    if (profileData.avatarUrl) {
      document.getElementById('avatarPreview').innerHTML =
        '<img src="' + profileData.avatarUrl + '?t=' + Date.now() + '" alt="avatar">';
    }

    if (!profileData.skills) profileData.skills = [];
    if (!profileData.projects) profileData.projects = [];
    renderSkills();
    renderProjects();
  } catch (err) {
    console.error('Load error:', err);
    profileData = { skills: [], projects: [] };
    renderSkills();
    renderProjects();
  }
}

// Avatar upload
document.getElementById('avatarFileInput').addEventListener('change', async function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('avatarPreview').innerHTML =
      '<img src="' + e.target.result + '" alt="avatar">';
  };
  reader.readAsDataURL(file);

  const progress = document.getElementById('uploadProgress');
  progress.style.display = 'block';
  try {
    const form = new FormData();
    form.append('avatar', file);
    const res = await fetch('/api/upload-avatar', {
      method: 'POST',
      headers: { 'Authorization': AUTH },
      body: form
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    profileData.avatarUrl = data.avatarUrl;
    progress.style.display = 'none';
    showToast('อัปโหลดรูปสำเร็จ! ✓');
  } catch (err) {
    progress.style.display = 'none';
    showToast('อัปโหลดไม่สำเร็จ: ' + err.message, 'error');
  }
});

// Render Skills
function renderSkills() {
  const skills = Array.isArray(profileData.skills) ? profileData.skills : [];
  document.getElementById('skillsList').innerHTML = skills.map((s, i) => `
    <div class="skill-item">
      <input type="text" value="${s.icon || ''}" class="skill-icon" data-i="${i}" placeholder="🎯">
      <input type="text" value="${s.name || ''}" class="skill-name" data-i="${i}" placeholder="Skill name">
      <input type="number" value="${s.pct || 50}" class="skill-pct" data-i="${i}" min="0" max="100">
      <button class="delete-skill" data-i="${i}">🗑️ ลบ</button>
    </div>`).join('');
  document.querySelectorAll('.delete-skill').forEach(btn =>
    btn.addEventListener('click', () => { profileData.skills.splice(+btn.dataset.i, 1); renderSkills(); }));
  document.querySelectorAll('.skill-icon,.skill-name,.skill-pct').forEach(inp =>
    inp.addEventListener('input', () => {
      const i = +inp.dataset.i;
      if (inp.classList.contains('skill-icon')) profileData.skills[i].icon = inp.value;
      if (inp.classList.contains('skill-name')) profileData.skills[i].name = inp.value;
      if (inp.classList.contains('skill-pct')) profileData.skills[i].pct = +inp.value;
    }));
}

// Render Projects
function renderProjects() {
  const projects = Array.isArray(profileData.projects) ? profileData.projects : [];
  document.getElementById('projectsList').innerHTML = projects.map((p, i) => `
    <div class="project-item">
      <h4>Project ${i + 1}</h4>
      <label>Tag</label>
      <input type="text" value="${p.tag || ''}" class="project-tag" data-i="${i}" placeholder="WEB APP">
      <label style="margin-top:10px">สี Tag</label>
      <select class="project-tagclass" data-i="${i}">
        <option value="tw" ${p.tagclass === 'tw' ? 'selected' : ''}>🟣 สีม่วง (WEB)</option>
        <option value="ta" ${p.tagclass === 'ta' ? 'selected' : ''}>🟢 สีเขียว (API)</option>
        <option value="tm" ${p.tagclass === 'tm' ? 'selected' : ''}>🟡 สีเหลือง (AI/ML)</option>
      </select>
      <label style="margin-top:10px">ชื่อ Project</label>
      <input type="text" value="${p.name || ''}" class="project-name" data-i="${i}" placeholder="Project name">
      <label style="margin-top:10px">คำอธิบาย</label>
      <textarea class="project-desc" data-i="${i}">${p.desc || ''}</textarea>
      <label style="margin-top:10px">เทคโนโลยี (คั่นด้วยจุลภาค)</label>
      <input type="text" value="${p.tech || ''}" class="project-tech" data-i="${i}" placeholder="React,Node.js,PostgreSQL">
      <button class="del-project-btn" data-i="${i}">🗑️ ลบ Project นี้</button>
    </div>`).join('');
  document.querySelectorAll('.del-project-btn').forEach(btn =>
    btn.addEventListener('click', () => { profileData.projects.splice(+btn.dataset.i, 1); renderProjects(); }));
  document.querySelectorAll('.project-tag,.project-tagclass,.project-name,.project-desc,.project-tech').forEach(inp =>
    inp.addEventListener('input', () => {
      const i = +inp.dataset.i;
      if (inp.classList.contains('project-tag')) profileData.projects[i].tag = inp.value;
      if (inp.classList.contains('project-tagclass')) profileData.projects[i].tagclass = inp.value;
      if (inp.classList.contains('project-name')) profileData.projects[i].name = inp.value;
      if (inp.classList.contains('project-desc')) profileData.projects[i].desc = inp.value;
      if (inp.classList.contains('project-tech')) profileData.projects[i].tech = inp.value;
    }));
}

document.getElementById('addSkillBtn').addEventListener('click', () => {
  profileData.skills.push({ icon: '⚡', name: 'New Skill', pct: 50 });
  renderSkills();
});

document.getElementById('addProjectBtn').addEventListener('click', () => {
  profileData.projects.push({ tag: 'WEB APP', tagclass: 'tw', name: 'New Project', desc: '', tech: '' });
  renderProjects();
});

// Save แล้ว redirect กลับหน้า Profile
document.getElementById('saveBtn').addEventListener('click', async () => {
  profileData.name = document.getElementById('name').value;
  profileData.role = document.getElementById('role').value;
  profileData.subtitle = document.getElementById('subtitle').value;
  profileData.bio = document.getElementById('bio').value;
  profileData.email = document.getElementById('email').value;
  profileData.github = document.getElementById('github').value;
  profileData.linkedin = document.getElementById('linkedin').value;
  profileData.instagram = document.getElementById('instagram').value;

  try {
    const res = await fetch('/api/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': AUTH },
      body: JSON.stringify(profileData)
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Save failed'); }

    showToast('บันทึกสำเร็จ! กำลังกลับหน้า Profile... ✓');
    setTimeout(() => { window.location.href = '/'; }, 750);

  } catch (err) {
    showToast('บันทึกไม่สำเร็จ: ' + err.message, 'error');
  }
});

window.addEventListener('load', loadProfile);
</script>
</body>
</html>
